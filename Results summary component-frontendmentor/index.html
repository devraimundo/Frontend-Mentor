<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component</title>

  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/responsive.css">

  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>

<body>
  <main>
    <section class="result">
      <h1>Your Result</h1>

      <div class="result_score">
        <span>76</span>
        <p>of 100</p>
      </div>

      <div class="result_text">
        <h2>Great</h2>
        <p>You scored higher than 65% of the people who have taken these tests.</p>
      </div>
    </section>

    <section class="summary">
      <h2>Summary</h2>

      <div class="summary_reaction">
        <p><span><img src="assets/images/icon-reaction.svg" alt=""> Reaction</span></p>
        <p><strong>80 <span class="span_opacity">/ 100</span></strong></p>
      </div>

      <div class="summary_memory">
        <p><span><img src="assets/images/icon-memory.svg" alt=""> Memory</span></p>
        <p><strong>92 <span class="span_opacity">/ 100</span></strong></p>
      </div>

      <div class="summary_verbal">
        <p><span><img src="assets/images/icon-verbal.svg" alt=""> Verbal</span></p>
        <p><strong>61 <span class="span_opacity">/ 100</span></strong></p>
      </div>

      <div class="summary_visual">
        <p><span><img src="assets/images/icon-visual.svg" alt=""> Visual</span></p>
        <p><strong>72 <span class="span_opacity">/ 100</span></strong></p>
      </div>

      <a href="#Continue">Continue</a>
    </section>
  </main>
  
  <!-- <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/devraimundo">devraimundo</a>.
  </div> -->
</body>
</html>
